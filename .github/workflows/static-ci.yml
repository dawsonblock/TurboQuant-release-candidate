name: static-ci

on:
  push:
  pull_request:

jobs:
  package-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build wheel and sdist
        run: python -m build
      - name: Compile source tree
        run: python -m compileall turboquant mlx_lm tests
      - name: Verify packaging metadata
        run: |
          python - <<'PY'
          import pathlib, tomllib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          assert data['project']['name'] == 'turboquant'
          assert pathlib.Path('dist').exists()
          print('packaging metadata ok')
          PY
      - name: Archive distributions
        uses: actions/upload-artifact@v4
        with:
          name: turboquant-dist
          path: dist/*
