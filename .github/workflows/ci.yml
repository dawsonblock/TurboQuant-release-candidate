name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Nox
      run: uv pip install nox nox-uv --system
      
    - name: Run Lint & Typecheck
      if: matrix.python-version == '3.11'
      run: |
        nox -s lint typecheck

    - name: Run Tests
      # If python 3.9, MLX >= 0.30.0 will fail to install, so we conditionally run tests skipping apple MLX dependencies on 3.9 only
      run: |
        if [ "${{ matrix.python-version }}" == "3.9" ]; then
          uv pip install '.[test]'
          nox -s tests -p 3.9
        else
          nox -s tests -p ${{ matrix.python-version }}
        fi
